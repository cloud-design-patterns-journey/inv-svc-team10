server:
  port: "${PORT:8080}"

spring:
  datasource:
    url: "${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/inventory_management}"
    driver-class-name: org.postgresql.Driver
    username: "${SPRING_DATASOURCE_USERNAME:inventory_user}"
    password: "${SPRING_DATASOURCE_PASSWORD:inventory_password}"
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

openapi:
  id: "${API_ID:hello-watson}"
  title: "${API_TITLE:Hello Watson}"
  description: "${API_DESCRIPTION:Simple Hello World API}"
